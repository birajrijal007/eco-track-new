<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EcoTrack – Register</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark:  #1a5c35;
      --green-mid:   #2e8b57;
      --green-light: #e8f5ee;
      --text:        #1a1a1a;
      --muted:       #6b7280;
      --border:      #d1d5db;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f4f1;
      font-family: 'DM Sans', sans-serif;
    }

    .card {
      display: flex;
      width: min(880px, 96vw);
      min-height: 580px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,.13);
      background: #fff;
    }

    /* ── LEFT PANEL ── */
    .left {
      position: relative;
      width: 42%;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }

    .left-photo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .left::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, rgba(26,92,53,.72) 0%, rgba(46,139,87,.55) 60%, rgba(10,40,20,.85) 100%);
      z-index: 1;
    }

    .left-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: space-between;
      height: 100%;
      width: 100%;
      padding: 36px 30px 36px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 9px;
      color: #fff;
      text-decoration: none;
    }

    .brand-icon {
      width: 38px; height: 38px;
      background: rgba(255,255,255,.18);
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 19px;
    }

    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 23px;
      letter-spacing: .3px;
    }

    .left-caption {
      color: #fff;
    }

    .left-caption h2 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      line-height: 1.3;
      margin-bottom: 10px;
    }

    .left-caption p {
      font-size: 13.5px;
      opacity: .8;
      line-height: 1.6;
    }

    /* ── RIGHT PANEL ── */
    .right {
      flex: 1;
      padding: 40px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .right h1 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      color: var(--text);
      margin-bottom: 4px;
    }

    .right .sub {
      font-size: 13.5px;
      color: var(--muted);
      margin-bottom: 26px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 5px;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 14px;
    }

    .input-wrap svg.icon {
      position: absolute;
      left: 13px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      width: 16px; height: 16px;
      pointer-events: none;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 11px 14px 11px 38px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color .2s;
      background: #fff;
    }
    input:focus { border-color: var(--green-mid); }

    /* strength bar */
    .strength-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      font-size: 12.5px;
      color: var(--muted);
    }
    .strength-row span.label { white-space: nowrap; }
    .strength-row span.val  { color: var(--green-mid); font-weight: 600; }
    .bar-track {
      flex: 1;
      height: 5px;
      background: #e5e7eb;
      border-radius: 99px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      width: 78%;
      background: var(--green-mid);
      border-radius: 99px;
      transition: width .4s;
    }

    .btn-primary {
      width: 100%;
      padding: 12px;
      background: var(--green-mid);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .1s;
      margin-bottom: 14px;
    }
    .btn-primary:hover { background: var(--green-dark); transform: translateY(-1px); }

    .login-link {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }
    .login-link a { color: var(--green-mid); font-weight: 600; text-decoration: none; }

    @media (max-width: 580px) {
      .left { display: none; }
      .right { padding: 32px 24px; }
    }
  </style>
</head>
