<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EcoTrack – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark: #1a5c35;
      --green-mid:  #2e8b57;
      --green-light:#e8f5ee;
      --text:       #1a1a1a;
      --muted:      #6b7280;
      --border:     #d1d5db;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      font-family: 'DM Sans', sans-serif;
    }

    .card {
      display: flex;
      width: min(860px, 96vw);
      min-height: 540px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,.13);
      background: #fff;
    }

    /* ── LEFT PANEL ── */
    .left {
      position: relative;
      width: 42%;
      flex-shrink: 0;
      background: var(--green-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 28px 28px;
      overflow: hidden;
    }

    .left::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, rgba(46,139,87,.55) 0%, rgba(26,92,53,.9) 60%);
      z-index: 1;
    }

    .left-photo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .left-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100%;
      width: 100%;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #fff;
      text-decoration: none;
      margin-bottom: auto;
    }

    .brand-icon {
      width: 36px; height: 36px;
      background: rgba(255,255,255,.18);
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 18px;
    }

    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      letter-spacing: .3px;
    }

    .left-caption {
      color: rgba(255,255,255,.9);
      text-align: center;
      margin-bottom: 20px;
    }

    .left-caption h2 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      line-height: 1.25;
      margin-bottom: 8px;
    }

    .left-caption p {
      font-size: 13.5px;
      opacity: .8;
      line-height: 1.55;
    }

    /* ── RIGHT PANEL ── */
    .right {
      flex: 1;
      padding: 44px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .right h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      color: var(--text);
      margin-bottom: 6px;
    }

    .right .sub {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 30px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 18px;
    }

    .input-wrap svg {
      position: absolute;
      left: 13px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      width: 16px; height: 16px;
      pointer-events: none;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 11px 14px 11px 38px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color .2s;
    }

    input:focus { border-color: var(--green-mid); }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
      font-size: 13px;
    }

    .row label { margin: 0; display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .row a { color: var(--green-mid); text-decoration: none; font-weight: 500; }

    .btn-primary {
      width: 100%;
      padding: 12px;
      background: var(--green-mid);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .1s;
      margin-bottom: 14px;
    }
    .btn-primary:hover { background: var(--green-dark); transform: translateY(-1px); }

    .divider {
      display: flex; align-items: center; gap: 10px;
      color: var(--muted); font-size: 13px; margin-bottom: 14px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .btn-google {
      width: 100%;
      padding: 11px;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background .2s;
      color: var(--text);
    }
    .btn-google:hover { background: #f9fafb; }

    .register {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      margin-top: 18px;
    }
    .register a { color: var(--green-mid); font-weight: 600; text-decoration: none; }

    @media (max-width: 580px) {
      .left { display: none; }
      .right { padding: 32px 24px; }
    }
  </style>
</head>

      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"/>

      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">

    <div class="row">
      <label><input type="checkbox"/> Remember me</label>
      <a href="#">Forgot Password?</a>
    </div>

    <button class="btn-primary">Login</button>

    <div class="divider">or</div>

    <button class="btn-google">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.8-6.8C35.8 2.5 30.2 0 24 0 14.6 0 6.6 5.4 2.6 13.3l7.9 6.1C12.4 13 17.8 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 7.1-10.1 7.1-17z"/>
        <path fill="#FBBC05" d="M10.5 28.6A14.5 14.5 0 019.5 24c0-1.6.3-3.1.7-4.6L2.3 13.3A23.9 23.9 0 000 24c0 3.9.9 7.5 2.6 10.7l7.9-6.1z"/>
        <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2.1 1.4-4.7 2.3-7.7 2.3-6.2 0-11.5-4.2-13.4-9.8l-7.9 6.1C6.6 42.6 14.6 48 24 48z"/>

      Login with Google
